name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Inyectar GoatCounter
        env:
          GOATCOUNTER_ENDPOINT: ${{ secrets.GOATCOUNTER_ENDPOINT }}
        run: |
          if [ -n "$GOATCOUNTER_ENDPOINT" ]; then
            sed -i "s|%%GOATCOUNTER_ENDPOINT%%|${GOATCOUNTER_ENDPOINT}|g" web/index.html
          else
            sed -i '/<!-- GOATCOUNTER_START -->/,/<!-- GOATCOUNTER_END -->/d' web/index.html
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          # Solo publicamos la carpeta del juego (sitio 100% estatico).
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
